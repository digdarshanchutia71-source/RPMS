<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Milestones - RPMS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body">
    
    <nav class="navbar">
        <div class="nav-brand">RPMS Milestone Management</div>
        <div class="nav-user">
            <button id="back-btn" class="btn-secondary" style="margin-right: 20px;">Back to Dashboard</button>
            <span id="user-name-display">Loading...</span>
            <button id="logout-btn" class="btn-secondary">Log Out</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1>Project Milestones</h1>
            <p style="color: #7f8c8d; margin-top: 5px;">Define project deliverables, set strict due dates, and track student progress.</p>
        </header>

        <div id="system-message" class="success-hidden"></div>
        <div id="error-message" class="error-hidden"></div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start;">
            
            <section class="dashboard-section" style="padding: 20px;">
                <h2 style="font-size: 1.2rem;">Create New Milestone</h2>
                <form id="milestone-form">
                    
                    <div class="input-group">
                        <label for="project_id">Select Project</label>
                        <select id="project_id" required>
                            <option value="" disabled selected>Loading projects...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="title">Milestone Title</label>
                        <input type="text" id="title" required placeholder="e.g., Literature Review, Draft 1">
                    </div>

                    <div class="input-group">
                        <label for="description">Description & Requirements</label>
                        <textarea id="description" rows="4" placeholder="Detail what the student needs to submit..." style="width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; font-family: inherit;"></textarea>
                    </div>

                    <div class="input-group">
                        <label for="due_date">Strict Due Date</label>
                        <input type="date" id="due_date" required style="width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px;">
                    </div>

                    <button type="submit" class="btn-primary" id="create-milestone-btn">Set Milestone</button>
                </form>
            </section>

            <section class="dashboard-section" style="padding: 20px;">
                <h2>Active Milestones</h2>
                <div id="milestones-list">
                    <p class="empty-state">Loading milestones...</p>
                </div>
            </section>

        </div>
    </main>

    <script src="js/manage-milestones.js"></script>
</body>
</html>
