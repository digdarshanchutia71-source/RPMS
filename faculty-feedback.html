<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback - RPMS Faculty Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body">
    
    <nav class="navbar">
        <div class="nav-brand">RPMS Faculty Portal</div>
        <div class="nav-user">
            <a href="faculty-dashboard.html" class="btn-secondary" style="text-decoration: none; margin-right: 20px;">Back to Dashboard</a>
            <span id="user-name-display">Loading...</span>
            <button id="logout-btn" class="btn-secondary">Log Out</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1>Evaluate Submission</h1>
            <p style="color: #7f8c8d; margin-top: 5px;">Review the document and provide your feedback and grading below.</p>
        </header>

        <div id="system-message" class="success-hidden"></div>
        <div id="error-message" class="error-hidden"></div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start;">
            
            <section class="dashboard-section" style="padding: 20px; background-color: #e8f4f8; border: 1px solid #bde0fe;">
                <h2 style="font-size: 1.2rem; border-bottom-color: #bde0fe;">Submission Details</h2>
                <div id="document-info">
                    <p class="empty-state">Loading document details...</p>
                </div>
            </section>

            <section class="dashboard-section" style="padding: 20px;">
                <form id="feedback-form">
                    
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="status">Evaluation Status</label>
                            <select id="status" required>
                                <option value="" disabled selected>Select status...</option>
                                <option value="approved">Approved</option>
                                <option value="needs_changes">Needs Changes / Revision</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="grade">Grade / Score (Optional)</label>
                            <input type="text" id="grade" placeholder="e.g., A, B+, 85/100">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="comments">Faculty Comments & Revision Requests</label>
                        <textarea id="comments" rows="6" required placeholder="Provide detailed feedback on methodology, formatting, or requested changes..." style="width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; font-family: inherit; resize: vertical;"></textarea>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-feedback-btn">Submit Evaluation</button>
                </form>
            </section>

        </div>
    </main>

    <script src="js/faculty-feedback.js"></script>
</body>
</html>
